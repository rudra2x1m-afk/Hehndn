<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - 30s Auto-Delete</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card: #1e293b;
            --success: #22c55e;
            --gold: #fbbf24;
            --danger: #ef4444;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .admin-card {
            background: var(--card);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 380px;
            text-align: center;
            border: 1px solid #334155;
        }

        h2 { margin-bottom: 5px; font-size: 22px; color: var(--gold); }
        .timer-text { color: var(--danger); font-size: 14px; font-weight: bold; margin-bottom: 15px; display: none; }

        .pass-container {
            background: #020617;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 20px;
            border: 2px solid #334155;
            cursor: pointer;
            position: relative;
            transition: all 0.2s ease;
        }

        .pass-container:active { transform: scale(0.96); border-color: var(--primary); }

        #displayPass {
            font-size: 32px;
            font-weight: 800;
            color: white;
            letter-spacing: 4px;
            display: block;
            user-select: none;
        }

        .copy-hint { font-size: 10px; color: #94a3b8; margin-top: 5px; text-transform: uppercase; }

        .btn-apply {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }

        .btn-apply:disabled { opacity: 0.6; cursor: not-allowed; }

        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--success);
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            display: none;
            z-index: 1000;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div id="toast">✅ Copied to Clipboard!</div>

    <div class="admin-card">
        <i class="fas fa-stopwatch" style="font-size: 40px; color: var(--gold); margin-bottom: 15px;"></i>
        <h2>YOUR PASSWORD</h2>
        <div id="expiryTimer" class="timer-text">EXPIRES IN: <span id="seconds">30</span>s</div>

        <div class="pass-container" onclick="copyToClipboard()">
            <span id="displayPass">-------</span>
            <div class="copy-hint">Click box to copy</div>
        </div>

        <button class="btn-apply" id="genBtn" onclick="generateAndSave()">
            <i class="fas fa-bolt"></i> GENERATE 
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, set, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDnM9ry5JreqjRXqQVUSiaBzudXuaAF-QI",
            databaseURL: "https://send-message-b178e-default-rtdb.asia-southeast1.firebasedatabase.app",
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let countdownInterval;

        window.generateAndSave = async function() {
            const btn = document.getElementById('genBtn');
            const display = document.getElementById('displayPass');
            const timerDiv = document.getElementById('expiryTimer');
            const secSpan = document.getElementById('seconds');

            // Clear any existing countdown
            clearInterval(countdownInterval);
            
            // Generate new password
            const newPass = Math.floor(1000000 + Math.random() * 9000000).toString();
            display.innerText = newPass;
            display.style.color = "white";
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> ACTIVATING...';

            try {
                // Save to Firebase
                const newRef = push(ref(db, 'allPasswords'));
                await set(newRef, { code: newPass, timestamp: Date.now() });

                // Setup countdown timer (30 seconds)
                let timeLeft = 30;
                timerDiv.style.display = "block";
                secSpan.innerText = timeLeft;

                // Countdown interval - updates every second
                countdownInterval = setInterval(() => {
                    timeLeft--;
                    secSpan.innerText = timeLeft;

                    if (timeLeft <= 0) {
                        clearInterval(countdownInterval);
                        timerDiv.style.display = "none";
                    }
                }, 1000);

                // Delete password after 30 seconds (30000ms)
                setTimeout(async () => {
                    await remove(newRef);
                    if (display.innerText === newPass) {
                        display.innerText = "EXPIRED";
                        display.style.color = "#ef4444";
                        timerDiv.style.display = "none";
                        clearInterval(countdownInterval);
                    }
                }, 30000);

                // Re-enable button after 2 seconds
                setTimeout(() => {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-bolt"></i> GENERATE NEW';
                }, 2000);

            } catch (e) {
                alert("Error: " + e.message);
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-bolt"></i> GENERATE';
            }
        };

        window.copyToClipboard = function() {
            const passText = document.getElementById('displayPass').innerText;
            if (passText === "-------" || passText === "EXPIRED") return;

            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(passText).then(showToast);
            } else {
                const textArea = document.createElement("textarea");
                textArea.value = passText;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                showToast();
            }
        };

        function showToast() {
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2000);
        }
    </script>
</body>
</html>
